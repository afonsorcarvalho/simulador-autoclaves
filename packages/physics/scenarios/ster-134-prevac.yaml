name: ster-134-prevac
dt_s: 0.05
duration_max_s: 1800
equipment:
  chamber_volume_l: 150
  jacket_volume_l: 25
  generator_water_l: 30
  heater_kw: 24
  # Generator safety valve setpoint: 4 bar absolute ≈ 144 °C saturation.
  # Prevents unbounded pressure build-up during closed-valve phases.
  generator_relief_bar: 4
  load:
    metal_kg: 20
    fabric_kg: 5
steps:
  # Phase 0 (0–300 s): pre-heat jacket + generator
  - { t: 0, valves: [V_STEAM_IN_JACKET], actuators: [HEATER_GEN] }

  # Pre-vacuum pulse 1: evacuate 30 s then steam 30 s
  - { t: 300, valves: [V_VAC], actuators: [HEATER_GEN, PUMP_VAC] }
  - { t: 330, valves: [V_STEAM_IN_INT, V_STEAM_IN_JACKET], actuators: [HEATER_GEN] }

  # Pre-vacuum pulse 2: evacuate 30 s then steam 30 s
  - { t: 360, valves: [V_VAC], actuators: [HEATER_GEN, PUMP_VAC] }
  - { t: 390, valves: [V_STEAM_IN_INT, V_STEAM_IN_JACKET], actuators: [HEATER_GEN] }

  # Pre-vacuum pulse 3: evacuate 30 s then steam 30 s
  - { t: 420, valves: [V_VAC], actuators: [HEATER_GEN, PUMP_VAC] }
  - { t: 450, valves: [V_STEAM_IN_INT, V_STEAM_IN_JACKET], actuators: [HEATER_GEN] }

  # Phase 3 (480–1100 s, ~10 min): sterilisation hold — pressurize to generator setpoint.
  # Exhaust closed: chamber builds to ~4 bar / ~143 °C as steam displaces residual air.
  # Generator relief at 4 bar bounds pressure. CLI uses h_gas_metal=200 / h_metal_fabric=100.
  # T_fabric crosses 100°C at ~670 s, reaches 134°C at ~840 s; F0 accumulates at ~20 min/min.
  # Target: F0 ≈ 50–2000 by end of hold (well within [50, 5000] gate).
  - { t: 480, valves: [V_STEAM_IN_INT, V_STEAM_IN_JACKET], actuators: [HEATER_GEN] }

  # Phase 4 (1100–1300 s): exhaust + cool, heater off
  - { t: 1100, valves: [V_EXHAUST], actuators: [] }

  # Phase 5 (1300–1800 s): vacuum drying
  - { t: 1300, valves: [V_VAC], actuators: [PUMP_VAC] }
