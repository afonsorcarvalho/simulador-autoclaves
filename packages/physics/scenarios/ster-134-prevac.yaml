name: ster-134-prevac
dt_s: 0.05
duration_max_s: 1800
equipment:
  chamber_volume_l: 150
  jacket_volume_l: 25
  generator_water_l: 30
  heater_kw: 24
  # Pressure hierarchy for 134 °C sterilization (real autoclave operating regime):
  #   P_chamber  = 3.04 bar abs (134 °C sat) — sterilization setpoint
  #   P_jacket   = 3.54 bar abs (138 °C)     — chamber + 0.5 bar, no temperature loss
  #   P_generator= 4.54 bar abs (~148 °C)    — chamber + 1.5 bar, drives flow into chamber
  # Each setpoint enforced via passive relief (vents excess to atmosphere).
  generator_relief_bar: 4.54
  jacket_relief_bar: 3.54
  chamber_relief_bar: 3.04
  # Wall thermal mass: 50 kg stainless for chamber, 15 kg for jacket.
  # These buffer T during vacuum pulses (25 kJ/K vs ~130 J/K gas-only).
  # Omit to use these defaults.
  chamber_wall_mass_kg: 50
  jacket_wall_mass_kg: 15
  # Jacket-to-chamber heat conduction through shared wall (W/K).
  # 150 W/K is typical for a 150 L stainless autoclave (~5 m² shared wall area).
  jacket_chamber_h_W_per_K: 150
  load:
    metal_kg: 20
    fabric_kg: 5
steps:
  # V_STEAM_IN_JACKET stays open through every phase except final exhaust/drying
  # so the jacket maintains ~3.5 bar / ~138°C (0.5 bar above 134°C setpoint).

  # Phase 0 (0–300 s): pre-heat jacket + generator
  - { t: 0, valves: [V_STEAM_IN_JACKET], actuators: [HEATER_GEN] }

  # Pre-vacuum pulse 1: evacuate 60 s (jacket stays fed), then steam 60 s
  - { t: 300, valves: [V_STEAM_IN_JACKET, V_VAC], actuators: [HEATER_GEN, PUMP_VAC] }
  - { t: 360, valves: [V_STEAM_IN_INT, V_STEAM_IN_JACKET], actuators: [HEATER_GEN] }

  # Pre-vacuum pulse 2: evacuate 60 s (jacket stays fed), then steam 60 s
  - { t: 420, valves: [V_STEAM_IN_JACKET, V_VAC], actuators: [HEATER_GEN, PUMP_VAC] }
  - { t: 480, valves: [V_STEAM_IN_INT, V_STEAM_IN_JACKET], actuators: [HEATER_GEN] }

  # Pre-vacuum pulse 3: evacuate 60 s (jacket stays fed), then steam 60 s
  - { t: 540, valves: [V_STEAM_IN_JACKET, V_VAC], actuators: [HEATER_GEN, PUMP_VAC] }
  - { t: 600, valves: [V_STEAM_IN_INT, V_STEAM_IN_JACKET], actuators: [HEATER_GEN] }

  # Phase 3 (660–1300 s, ~10 min): sterilisation hold — chamber + jacket both fed by generator.
  # Generator relief at 5 bar caps both. T_fabric crosses 134°C and F0 accumulates ~20 min/min.
  - { t: 660, valves: [V_STEAM_IN_INT, V_STEAM_IN_JACKET], actuators: [HEATER_GEN] }

  # Phase 4 (1300–1450 s): exhaust chamber + cool, jacket closed, heater off
  - { t: 1300, valves: [V_EXHAUST], actuators: [] }

  # Phase 5 (1450–1800 s): vacuum drying
  - { t: 1450, valves: [V_VAC], actuators: [PUMP_VAC] }
